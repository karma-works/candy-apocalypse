<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    Candy Apocalypse Spritemap
    All symbols follow the "Candy Apocalypse" color theme:
      Primary:  #00D4FF (Sky Pop), #FFB7C5 (Cotton Cloud), #FFE135 (Solar Burst), #32FF00 (Toxic Lime)
      Accent:   #FF6B35 (Rage Orange), #9B5DE5 (Mystic Violet), #FF0044 (Cherry Bomb)
      Outline:  #1A1A2E (Deep Space) at 3-5px stroke
  -->

  <symbol id="bfuga0" viewBox="0 0 256 256">
    <use href="#bfg" />
  </symbol>

  <symbol id="csawa0" viewBox="0 0 256 256">
    <use href="#chainsaw" />
  </symbol>

  <symbol id="launa0" viewBox="0 0 256 256">
    <use href="#rocket_launcher" />
  </symbol>

  <symbol id="mguna0" viewBox="0 0 256 256">
    <use href="#chaingun" />
  </symbol>

  <symbol id="pisga0" viewBox="0 0 256 256">
    <use href="#pistol" />
  </symbol>

  <symbol id="plasa0" viewBox="0 0 256 256">
    <use href="#plasma_rifle" />
  </symbol>

  <symbol id="shtga0" viewBox="0 0 256 256">
    <use href="#shotgun" />
  </symbol>

  <symbol id="barrel" viewBox="0 0 50 70">
    <rect x="2" y="2" width="46" height="62" fill="#2d6f2d" rx="4" />
              
              <rect x="2" y="14" width="46" height="9" fill="#1d4f1d" />
              <rect x="2" y="48" width="46" height="9" fill="#1d4f1d" />
              
              <rect x="2" y="2" width="46" height="6" fill="#1a401a" rx="2" />
              
              <rect x="2" y="62" width="46" height="6" fill="#1a401a" rx="2" />
              
              <circle cx="25" cy="34" r="10" fill="#ffff00" />
              <circle cx="25" cy="34" r="4" fill="#2d6f2d" />
              
              <circle cx="5" cy="12" r="2" fill="#3a8a3a" />
              <circle cx="45" cy="12" r="2" fill="#3a8a3a" />
  </symbol>

  <!-- Huge energy core -->
  <symbol id="bfg" viewBox="0 0 200 300">
    <defs>
        <linearGradient id="bfgBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#32FF00"/>
          <stop offset="50%" stop-color="#00D4FF"/>
          <stop offset="100%" stop-color="#9B5DE5"/>
        </linearGradient>
        <linearGradient id="bfgCore" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FF0044"/>
          <stop offset="50%" stop-color="#FFE135"/>
          <stop offset="100%" stop-color="#32FF00"/>
        </linearGradient>
        <filter id="megaGlow">
          <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      
      
      <rect x="45" y="230" width="110" height="60" rx="10" fill="#FF6B35" stroke="#1A1A2E" stroke-width="5"/>
      <rect x="53" y="238" width="94" height="44" rx="8" fill="#CC5528" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <polygon points="40,230 160,230 145,80 55,80" fill="url(#bfgBody)" stroke="#1A1A2E" stroke-width="5"/>
      
      
      <circle cx="100" cy="170" r="40" fill="url(#bfgCore)" stroke="#1A1A2E" stroke-width="4" filter="url(#megaGlow)"/>
      <circle cx="100" cy="170" r="28" fill="#FFB7C5" stroke="#1A1A2E" stroke-width="3"/>
      <circle cx="100" cy="170" r="16" fill="#32FF00" filter="url(#megaGlow)"/>
      <circle cx="100" cy="170" r="8" fill="#FFFFFF"/>
      
      
      <polygon points="60,80 140,80 130,30 70,30" fill="#1A1A2E" stroke="#1A1A2E" stroke-width="4"/>
      <polygon points="70,80 130,80 120,40 80,40" fill="#32FF00" stroke="#1A1A2E" stroke-width="3" filter="url(#megaGlow)"/>
      
      
      <ellipse cx="100" cy="25" rx="30" ry="18" fill="#32FF00" stroke="#1A1A2E" stroke-width="4" filter="url(#megaGlow)"/>
      <ellipse cx="100" cy="25" rx="20" ry="12" fill="#00D4FF"/>
      <ellipse cx="100" cy="25" rx="10" ry="6" fill="#FFFFFF"/>
      
      
      <circle cx="60" cy="50" r="5" fill="#FF0044"/>
      <circle cx="140" cy="50" r="5" fill="#9B5DE5"/>
      <circle cx="75" cy="35" r="4" fill="#FFB7C5"/>
      <circle cx="125" cy="35" r="4" fill="#FFE135"/>
      
      
      <line x1="50" y1="10" x2="150" y2="10" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
      <line x1="45" y1="18" x2="155" y2="18" stroke="#32FF00" stroke-width="2" opacity="0.5"/>
      
      
      <path d="M 55,120 Q 100,100 145,120" fill="none" stroke="#FFE135" stroke-width="4"/>
      <path d="M 55,140 Q 100,120 145,140" fill="none" stroke="#FF6B35" stroke-width="4"/>
      
      
      <text x="100" y="280" text-anchor="middle" font-family="Impact, sans-serif" font-size="20" 
            fill="#1A1A2E" font-weight="bold" letter-spacing="2">PARTY!</text>
  </symbol>

  <!-- Ammo drum -->
  <symbol id="chaingun" viewBox="0 0 200 300">
    <defs>
        <linearGradient id="chaingunBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#00D4FF"/>
          <stop offset="100%" stop-color="#9B5DE5"/>
        </linearGradient>
        <linearGradient id="barrels" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#C0C0C0"/>
          <stop offset="50%" stop-color="#E8E8E8"/>
          <stop offset="100%" stop-color="#A0A0A0"/>
        </linearGradient>
      </defs>
      
      
      <rect x="60" y="230" width="80" height="60" rx="8" fill="#FF6B35" stroke="#1A1A2E" stroke-width="4"/>
      <rect x="68" y="238" width="64" height="44" rx="6" fill="#CC5528" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <polygon points="50,230 150,230 135,130 65,130" fill="url(#chaingunBody)" stroke="#1A1A2E" stroke-width="4"/>
      
      
      <ellipse cx="100" cy="200" rx="35" ry="25" fill="#32FF00" stroke="#1A1A2E" stroke-width="3"/>
      <ellipse cx="100" cy="200" rx="25" ry="18" fill="#1A1A2E"/>
      <ellipse cx="100" cy="200" rx="15" ry="10" fill="#FFE135"/>
      
      
      <rect x="70" y="50" width="60" height="80" rx="10" fill="#1A1A2E" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <circle cx="85" cy="70" r="8" fill="url(#barrels)" stroke="#1A1A2E" stroke-width="2"/>
      <circle cx="115" cy="70" r="8" fill="url(#barrels)" stroke="#1A1A2E" stroke-width="2"/>
      <circle cx="85" cy="100" r="8" fill="url(#barrels)" stroke="#1A1A2E" stroke-width="2"/>
      <circle cx="115" cy="100" r="8" fill="url(#barrels)" stroke="#1A1A2E" stroke-width="2"/>
      <circle cx="100" cy="85" r="8" fill="url(#barrels)" stroke="#1A1A2E" stroke-width="2"/>
      <circle cx="100" cy="65" r="5" fill="#FF0044" stroke="#1A1A2E" stroke-width="2"/>
      
      
      <polygon points="95,50 105,50 100,35" fill="#FFE135" stroke="#1A1A2E" stroke-width="2"/>
      
      
      <line x1="85" y1="55" x2="75" y2="25" stroke="#FF0044" stroke-width="3" stroke-linecap="round"/>
      <line x1="100" y1="50" x2="100" y2="15" stroke="#FFB7C5" stroke-width="3" stroke-linecap="round"/>
      <line x1="115" y1="55" x2="125" y2="25" stroke="#32FF00" stroke-width="3" stroke-linecap="round"/>
      
      
      <path d="M 90,60 A 10,10 0 0 1 110,60" fill="none" stroke="#FFB7C5" stroke-width="2" stroke-dasharray="3,2"/>
      
      
      <text x="100" y="280" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" 
            fill="#1A1A2E" font-weight="bold" transform="rotate(3 100 280)">RA-TA-TA!</text>
  </symbol>

  <!-- Engine housing -->
  <symbol id="chainsaw" viewBox="0 0 200 300">
    <defs>
        <linearGradient id="chainsawBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FF6B35"/>
          <stop offset="100%" stop-color="#FF0044"/>
        </linearGradient>
        <linearGradient id="chainTeeth" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#FFE135"/>
          <stop offset="100%" stop-color="#FF6B35"/>
        </linearGradient>
      </defs>
      
      
      <rect x="40" y="220" width="120" height="70" rx="10" fill="#9B5DE5" stroke="#1A1A2E" stroke-width="4"/>
      <rect x="50" y="230" width="100" height="50" rx="8" fill="#7B3CE3" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <polygon points="50,220 150,220 140,140 60,140" fill="url(#chainsawBody)" stroke="#1A1A2E" stroke-width="4"/>
      
      
      <rect x="55" y="150" width="90" height="60" rx="5" fill="#32FF00" stroke="#1A1A2E" stroke-width="3"/>
      <circle cx="100" cy="180" r="20" fill="#1A1A2E"/>
      <circle cx="100" cy="180" r="12" fill="#FFE135"/>
      
      
      <rect x="70" y="40" width="60" height="100" rx="5" fill="#00D4FF" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <polygon points="75,140 75,45 65,45 65,135" fill="url(#chainTeeth)" stroke="#1A1A2E" stroke-width="2"/>
      <polygon points="125,140 125,45 135,45 135,135" fill="url(#chainTeeth)" stroke="#1A1A2E" stroke-width="2"/>
      
      
      <path d="M 80,50 L 85,40 L 90,50 L 95,40 L 100,50 L 105,40 L 110,50 L 115,40 L 120,50" 
            fill="none" stroke="#1A1A2E" stroke-width="4" stroke-linecap="round"/>
      
      
      <circle cx="90" cy="30" r="3" fill="#FFB7C5"/>
      <circle cx="110" cy="25" r="4" fill="#FFE135"/>
      <circle cx="100" cy="20" r="3" fill="#32FF00"/>
      <rect x="95" y="15" width="5" height="5" fill="#00D4FF" transform="rotate(30 97.5 17.5)"/>
      
      
      <text x="100" y="270" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="18" 
            fill="#1A1A2E" font-weight="bold" transform="rotate(-5 100 270)">ZZZZ!</text>
  </symbol>

  <symbol id="door" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#3a2f2a" />
              <rect x="10" y="10" width="80" height="90" fill="#5a4f4a" stroke="#222" stroke-width="3" />
              <path d="M 50 10 L 50 100" stroke="#222" stroke-width="2" />
              <rect x="25" y="40" width="10" height="20" fill="#8a7f7a" rx="2" />
              <rect x="65" y="40" width="10" height="20" fill="#8a7f7a" rx="2" />
  </symbol>

  <symbol id="imp" viewBox="0 0 80 100">
    <rect x="22" y="78" width="12" height="22" fill="#4a2a10" rx="3"/>
              <rect x="46" y="78" width="12" height="22" fill="#4a2a10" rx="3"/>
              
              <ellipse cx="28" cy="100" rx="10" ry="4" fill="#3a1a08"/>
              <ellipse cx="52" cy="100" rx="10" ry="4" fill="#3a1a08"/>
              
              <path d="M 15 78 Q 10 50 20 30 Q 30 10 40 8 Q 50 10 60 30 Q 70 50 65 78 Z" fill="#6b3a20"/>
              
              <path d="M 15 60 L 2 70 L 8 50 Z" fill="#7a4a28"/>
              <path d="M 65 60 L 78 70 L 72 50 Z" fill="#7a4a28"/>
              
              <ellipse cx="40" cy="22" rx="22" ry="20" fill="#6b3a20"/>
              
              <path d="M 22 14 L 12 0 L 28 10 Z" fill="#888"/>
              <path d="M 58 14 L 68 0 L 52 10 Z" fill="#888"/>
              
              <circle cx="30" cy="20" r="5" fill="#ff2200"/>
              <circle cx="50" cy="20" r="5" fill="#ff2200"/>
              <circle cx="30" cy="20" r="2" fill="#ffaa00"/>
              <circle cx="50" cy="20" r="2" fill="#ffaa00"/>
              
              <path d="M 28 34 Q 40 44 52 34" stroke="#fff" stroke-width="2" fill="none"/>
  </symbol>

  <symbol id="pistol" viewBox="0 0 256 256">
    <g transform="translate(128, 240)">
        <path d="M -40 0 L 40 0 L 30 -60 L -30 -60 Z" fill="#00D4FF" stroke="#1A1A2E" stroke-width="4"/>
        
        <path d="M -30 -60 L 30 -60 L 20 -100 L -20 -100 Z" fill="#00D4FF" stroke="#1A1A2E" stroke-width="4"/>
        
        <path d="M -25 -100 L 25 -100 L 15 -140 L -15 -140 Z" fill="#FFB7C5" stroke="#1A1A2E" stroke-width="4"/>
        
        <rect x="-20" y="-140" width="40" height="10" fill="#1A1A2E"/>
        
        <ellipse cx="0" cy="-145" rx="12" ry="4" fill="#1A1A2E"/>
        
        <path d="M -35 0 L -20 -20 L -20 0 Z" fill="#00D4FF" stroke="#1A1A2E" stroke-width="3"/>
        
        <circle cx="25" cy="-50" r="8" fill="#FF0044" stroke="#1A1A2E" stroke-width="3"/>
        
        <path d="M -15 -40 L 15 -40 L 10 -50 L -10 -50 Z" fill="#FFE135" stroke="#1A1A2E" stroke-width="2"/>
        
        <text x="0" y="-80" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E" font-family="Arial Black">PEW!</text>
      </g>
  </symbol>

  <!-- Energy core -->
  <symbol id="plasma_rifle" viewBox="0 0 200 300">
    <defs>
        <linearGradient id="plasmaBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#00D4FF"/>
          <stop offset="100%" stop-color="#9B5DE5"/>
        </linearGradient>
        <linearGradient id="plasmaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#32FF00"/>
          <stop offset="50%" stop-color="#00D4FF"/>
          <stop offset="100%" stop-color="#9B5DE5"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      
      
      <rect x="55" y="230" width="90" height="60" rx="8" fill="#9B5DE5" stroke="#1A1A2E" stroke-width="4"/>
      <rect x="63" y="238" width="74" height="44" rx="6" fill="#7B3CE3" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <polygon points="50,230 150,230 135,100 65,100" fill="url(#plasmaBody)" stroke="#1A1A2E" stroke-width="4"/>
      
      
      <circle cx="100" cy="180" r="25" fill="#FFE135" stroke="#1A1A2E" stroke-width="3" filter="url(#glow)"/>
      <circle cx="100" cy="180" r="15" fill="#FFB7C5"/>
      <circle cx="100" cy="180" r="8" fill="#1A1A2E"/>
      
      
      <rect x="70" y="50" width="60" height="50" rx="8" fill="#1A1A2E" stroke="#1A1A2E" stroke-width="3"/>
      <rect x="80" y="55" width="40" height="40" rx="5" fill="url(#plasmaGlow)" filter="url(#glow)"/>
      
      
      <ellipse cx="100" cy="45" rx="20" ry="12" fill="#32FF00" stroke="#1A1A2E" stroke-width="3" filter="url(#glow)"/>
      <ellipse cx="100" cy="45" rx="12" ry="7" fill="#00D4FF"/>
      
      
      <path d="M 85,45 L 80,30 L 90,35 L 85,20" fill="none" stroke="#32FF00" stroke-width="3" stroke-linecap="round"/>
      <path d="M 115,45 L 120,30 L 110,35 L 115,20" fill="none" stroke="#00D4FF" stroke-width="3" stroke-linecap="round"/>
      <path d="M 100,38 L 100,15" fill="none" stroke="#9B5DE5" stroke-width="3" stroke-linecap="round"/>
      
      
      <rect x="60" y="120" width="15" height="40" rx="2" fill="#32FF00" stroke="#1A1A2E" stroke-width="2"/>
      <rect x="125" y="120" width="15" height="40" rx="2" fill="#32FF00" stroke="#1A1A2E" stroke-width="2"/>
      
      
      <circle cx="65" cy="140" r="4" fill="#FFB7C5"/>
      <circle cx="135" cy="140" r="4" fill="#FFB7C5"/>
      
      
      <text x="100" y="280" text-anchor="middle" font-family="Courier New, monospace" font-size="14" 
            fill="#1A1A2E" font-weight="bold">*BZZZT*</text>
  </symbol>

  <!-- Front sight -->
  <symbol id="rocket_launcher" viewBox="0 0 200 300">
    <defs>
        <linearGradient id="rocketBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#9B5DE5"/>
          <stop offset="100%" stop-color="#FF6B35"/>
        </linearGradient>
        <linearGradient id="rocketTube" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#32FF00"/>
          <stop offset="50%" stop-color="#00D4FF"/>
          <stop offset="100%" stop-color="#32FF00"/>
        </linearGradient>
      </defs>
      
      
      <rect x="50" y="230" width="100" height="60" rx="8" fill="#FF0044" stroke="#1A1A2E" stroke-width="4"/>
      <rect x="58" y="238" width="84" height="44" rx="6" fill="#CC0036" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <polygon points="55,230 145,230 130,80 70,80" fill="url(#rocketTube)" stroke="#1A1A2E" stroke-width="4"/>
      
      
      <polygon points="80,80 120,80 110,60 90,60" fill="#FFB7C5" stroke="#1A1A2E" stroke-width="3"/>
      
      
      <ellipse cx="100" cy="65" rx="25" ry="15" fill="#1A1A2E" stroke="#1A1A2E" stroke-width="3"/>
      <ellipse cx="100" cy="65" rx="18" ry="10" fill="#2A2A4E"/>
      
      
      <polygon points="90,85 110,85 105,75 95,75" fill="#FFE135" stroke="#1A1A2E" stroke-width="2"/>
      
      
      <circle cx="75" cy="180" r="12" fill="#FFB7C5" stroke="#1A1A2E" stroke-width="2"/>
      <circle cx="125" cy="180" r="12" fill="#FFB7C5" stroke="#1A1A2E" stroke-width="2"/>
      <path d="M 75,180 Q 100,200 125,180" fill="none" stroke="#1A1A2E" stroke-width="2"/>
      
      
      <circle cx="100" cy="40" r="6" fill="#FFE135"/>
      <line x1="100" y1="40" x2="85" y2="25" stroke="#FF6B35" stroke-width="2"/>
      <line x1="100" y1="40" x2="115" y2="25" stroke="#FF6B35" stroke-width="2"/>
      <line x1="100" y1="40" x2="100" y2="20" stroke="#FF0044" stroke-width="2"/>
      <circle cx="85" cy="25" r="3" fill="#FFB7C5"/>
      <circle cx="115" cy="25" r="3" fill="#00D4FF"/>
      <circle cx="100" cy="20" r="3" fill="#32FF00"/>
      
      
      <text x="100" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="14" 
            fill="#1A1A2E" font-weight="bold" font-style="italic">~LAUNCH~</text>
  </symbol>

  <symbol id="shotgun" viewBox="0 0 256 256">
    <g transform="translate(128, 240)">
        <path d="M -50 0 L 50 0 L 35 -40 L -35 -40 Z" fill="#8B4513" stroke="#1A1A2E" stroke-width="4"/>
        
        <path d="M -35 -40 L -15 -40 L -10 -120 L -25 -120 Z" fill="#1A1A2E"/>
        <path d="M 15 -40 L 35 -40 L 25 -120 L 10 -120 Z" fill="#1A1A2E"/>
        
        <ellipse cx="-18" cy="-120" rx="6" ry="3" fill="#1A1A2E"/>
        <ellipse cx="18" cy="-120" rx="6" ry="3" fill="#1A1A2E"/>
        
        <path d="M -10 -120 L 10 -120 L 5 -160 L -5 -160 Z" fill="#4a4a4a" stroke="#1A1A2E" stroke-width="3"/>
        
        <path d="M -55 0 L -35 0 L -35 -20 L -50 -20 Z" fill="#FF6B35" stroke="#1A1A2E" stroke-width="3"/>
        
        <circle cx="0" cy="-20" r="6" fill="#FFE135" stroke="#1A1A2E" stroke-width="2"/>
        
        <text x="0" y="-70" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF6B35" font-family="Arial Black">CLICK!</text>
      </g>
  </symbol>

  <symbol id="wall_base" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#2a2a2a" />
              <path d="M 0 0 L 100 100 M 100 0 L 0 100" stroke="#4a4a4a" stroke-width="4" />
              <rect x="20" y="20" width="60" height="60" fill="none" stroke="#6a6a6a" stroke-width="2" />
              <circle cx="20" cy="20" r="3" fill="#888" />
              <circle cx="80" cy="20" r="3" fill="#888" />
              <circle cx="20" cy="80" r="3" fill="#888" />
              <circle cx="80" cy="80" r="3" fill="#888" />
  </symbol>
</svg>
