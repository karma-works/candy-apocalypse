<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    Candy Apocalypse Spritemap
    All symbols follow the "Candy Apocalypse" color theme:
      Primary:  #00D4FF (Sky Pop), #FFB7C5 (Cotton Cloud), #FFE135 (Solar Burst), #32FF00 (Toxic Lime)
      Accent:   #FF6B35 (Rage Orange), #9B5DE5 (Mystic Violet), #FF0044 (Cherry Bomb)
      Outline:  #1A1A2E (Deep Space) at 3-5px stroke
  -->

  <!-- Barrel body fills entire viewBox with no padding -->
  <symbol id="barrel" viewBox="0 0 50 70">
    <rect x="2" y="2" width="46" height="62" fill="#2d6f2d" rx="4" />
      
      <rect x="2" y="14" width="46" height="9" fill="#1d4f1d" />
      <rect x="2" y="48" width="46" height="9" fill="#1d4f1d" />
      
      <rect x="2" y="2" width="46" height="6" fill="#1a401a" rx="2" />
      
      <rect x="2" y="62" width="46" height="6" fill="#1a401a" rx="2" />
      
      <circle cx="25" cy="34" r="10" fill="#ffff00" />
      <circle cx="25" cy="34" r="4" fill="#2d6f2d" />
      
      <circle cx="5" cy="12" r="2" fill="#3a8a3a" />
      <circle cx="45" cy="12" r="2" fill="#3a8a3a" />
  </symbol>

  <!-- Main rectangular body -->
  <symbol id="chaingun" viewBox="0 0 280 110">
    <rect x="60" y="40" width="180" height="35" rx="4" fill="#4a4a4a" stroke="#777" stroke-width="1.5"/>
      
      <ellipse cx="90" cy="57" rx="30" ry="28" fill="#3a3a3a" stroke="#666" stroke-width="2"/>
      
      <rect x="90" y="20" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
      <rect x="90" y="36" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
      <rect x="90" y="52" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
      <rect x="90" y="68" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
      
      <rect x="130" y="17" width="12" height="62" rx="3" fill="#3a3a3a" stroke="#666" stroke-width="1.2"/>
      <rect x="200" y="17" width="12" height="62" rx="3" fill="#3a3a3a" stroke="#666" stroke-width="1.2"/>
      
      <ellipse cx="255" cy="57" rx="12" ry="38" fill="none" stroke="#888" stroke-width="2.5"/>
      
      <rect x="20" y="48" width="45" height="55" rx="5" fill="#3a3a3a" stroke="#666" stroke-width="1.5"/>
      
      <path d="M20 60 Q10 70 20 80" fill="none" stroke="#888" stroke-dasharray="3,3" stroke-width="2"/>
      
      <ellipse cx="90" cy="57" rx="10" ry="10" fill="#222" stroke="#555" stroke-width="1"/>
  </symbol>

  <symbol id="door" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#3a2f2a" />
      <rect x="10" y="10" width="80" height="90" fill="#5a4f4a" stroke="#222" stroke-width="3" />
      <path d="M 50 10 L 50 100" stroke="#222" stroke-width="2" />
      <rect x="25" y="40" width="10" height="20" fill="#8a7f7a" rx="2" />
      <rect x="65" y="40" width="10" height="20" fill="#8a7f7a" rx="2" />
  </symbol>

  <!-- Legs -->
  <symbol id="imp" viewBox="0 0 80 100">
    <rect x="22" y="78" width="12" height="22" fill="#4a2a10" rx="3"/>
      <rect x="46" y="78" width="12" height="22" fill="#4a2a10" rx="3"/>
      
      <ellipse cx="28" cy="100" rx="10" ry="4" fill="#3a1a08"/>
      <ellipse cx="52" cy="100" rx="10" ry="4" fill="#3a1a08"/>
      
      <path d="M 15 78 Q 10 50 20 30 Q 30 10 40 8 Q 50 10 60 30 Q 70 50 65 78 Z" fill="#6b3a20"/>
      
      <path d="M 15 60 L 2 70 L 8 50 Z" fill="#7a4a28"/>
      <path d="M 65 60 L 78 70 L 72 50 Z" fill="#7a4a28"/>
      
      <ellipse cx="40" cy="22" rx="22" ry="20" fill="#6b3a20"/>
      
      <path d="M 22 14 L 12 0 L 28 10 Z" fill="#888"/>
      <path d="M 58 14 L 68 0 L 52 10 Z" fill="#888"/>
      
      <circle cx="30" cy="20" r="5" fill="#ff2200"/>
      <circle cx="50" cy="20" r="5" fill="#ff2200"/>
      <circle cx="30" cy="20" r="2" fill="#ffaa00"/>
      <circle cx="50" cy="20" r="2" fill="#ffaa00"/>
      
      <path d="M 28 34 Q 40 44 52 34" stroke="#fff" stroke-width="2" fill="none"/>
  </symbol>

  <!-- Main grip -->
  <symbol id="pistol" viewBox="0 0 200 100">
    <rect x="20" y="50" width="40" height="50" rx="4" fill="#3a3a3a" stroke="#666" stroke-width="1.5"/>
      
      <path d="M42 70 Q55 75 60 70" fill="none" stroke="#555" stroke-width="2"/>
      
      <rect x="60" y="42" width="110" height="18" rx="3" fill="#444" stroke="#777" stroke-width="1.5"/>
      
      <rect x="60" y="42" width="90" height="8" rx="2" fill="#555" stroke="#888" stroke-width="1"/>
      
      <rect x="155" y="35" width="8" height="8" rx="1" fill="#888"/>
      
      <rect x="95" y="44" width="25" height="8" rx="1" fill="#222" stroke="#555" stroke-width="0.5"/>
      
      <path d="M51 70 L55 80" fill="none" stroke="#666" stroke-width="2.5"/>
      
      <rect x="22" y="48" width="10" height="8" rx="2" fill="#555"/>
  </symbol>

  <!-- Double barrel shotgun pointing forward -->
  <symbol id="shotgun" viewBox="0 0 200 200">
    <g transform="translate(100, 150)">
        
        <rect x="5" y="-100" width="30" height="120" fill="#222" rx="5" />
        <ellipse cx="20" cy="-100" rx="15" ry="5" fill="#000" />
        
        <rect x="-35" y="-100" width="30" height="120" fill="#222" rx="5" />
        <ellipse cx="-20" cy="-100" rx="15" ry="5" fill="#000" />
        
        <rect x="-5" y="-95" width="10" height="110" fill="#444" />
        
        <path d="M -40 20 Q 0 -10 40 20 L 50 60 L -50 60 Z" fill="#4a2e15" />
      </g>
  </symbol>

  <!-- Left barrel -->
  <symbol id="supershotgun" viewBox="0 0 180 120">
    <rect x="60" y="30" width="120" height="14" rx="3" fill="#555" stroke="#888" stroke-width="1.5"/>
      
      <rect x="60" y="48" width="120" height="14" rx="3" fill="#555" stroke="#888" stroke-width="1.5"/>
      
      <rect x="100" y="32" width="10" height="28" rx="2" fill="#3a3a3a" stroke="#666" stroke-width="1"/>
      <rect x="160" y="32" width="10" height="28" rx="2" fill="#3a3a3a" stroke="#666" stroke-width="1"/>
      
      <rect x="20" y="30" width="45" height="32" rx="4" fill="#444" stroke="#777" stroke-width="1.5"/>
      
      <rect x="5" y="50" width="30" height="60" rx="5" fill="#5a3a20" stroke="#8a5a30" stroke-width="1.5"/>
      
      <line x1="8" y1="57" x2="28" y2="57" stroke="#4a2a10" stroke-width="0.8"/>
      <line x1="8" y1="65" x2="28" y2="65" stroke="#4a2a10" stroke-width="0.8"/>
      <line x1="8" y1="73" x2="28" y2="73" stroke="#4a2a10" stroke-width="0.8"/>
      
      <path d="M35 60 Q48 70 55 62" fill="none" stroke="#666" stroke-width="2"/>
      
      <line x1="40" y1="62" x2="42" y2="72" stroke="#888" stroke-width="2"/>
      <line x1="46" y1="62" x2="48" y2="72" stroke="#888" stroke-width="2"/>
      
      <ellipse cx="180" cy="37" rx="5" ry="7" fill="#222" stroke="#666" stroke-width="1"/>
      <ellipse cx="180" cy="55" rx="5" ry="7" fill="#222" stroke="#666" stroke-width="1"/>
  </symbol>

  <symbol id="wall_base" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#2a2a2a" />
      <path d="M 0 0 L 100 100 M 100 0 L 0 100" stroke="#4a4a4a" stroke-width="4" />
      <rect x="20" y="20" width="60" height="60" fill="none" stroke="#6a6a6a" stroke-width="2" />
      <circle cx="20" cy="20" r="3" fill="#888" />
      <circle cx="80" cy="20" r="3" fill="#888" />
      <circle cx="20" cy="80" r="3" fill="#888" />
      <circle cx="80" cy="80" r="3" fill="#888" />
  </symbol>
</svg>
