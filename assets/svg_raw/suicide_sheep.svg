  <rect x="62" y="55" width="6" height="15" rx="2" fill="#2D2D44" stroke="#1A1A2E" stroke-width="1"/>
  
  <path d="M 70 55 Q 80 40 75 25" stroke="#1A1A2E" stroke-width="2" fill="none"/>
  <circle cx="75" cy="25" r="4" fill="#FFE135" stroke="#FF6B35" stroke-width="2" filter="url(#fuseGlow)">
