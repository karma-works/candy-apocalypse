  <circle cx="30" cy="40" r="10" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2"/>
  <circle cx="70" cy="40" r="10" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2"/>
