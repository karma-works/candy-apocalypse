  <ellipse cx="40" cy="22" rx="6" ry="7" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2"/>
  <ellipse cx="60" cy="22" rx="6" ry="7" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2"/>
  
  <circle cx="42" cy="24" r="3" fill="#1A1A2E"/>
  <circle cx="62" cy="24" r="3" fill="#1A1A2E"/>
  <circle cx="43" cy="23" r="1" fill="#FFFFFF"/>
  <circle cx="63" cy="23" r="1" fill="#FFFFFF"/>
  
  <ellipse cx="50" cy="32" rx="4" ry="3" fill="#1A1A2E"/>
  
  <rect x="25" y="50" width="50" height="25" rx="5" fill="url(#dynamiteGrad)" stroke="#1A1A2E" stroke-width="3"/>
  
  <rect x="32" y="55" width="6" height="15" rx="2" fill="#2D2D44" stroke="#1A1A2E" stroke-width="1"/>
