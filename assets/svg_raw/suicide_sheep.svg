<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="sheepWool" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFB7C5"/>
    </radialGradient>
    <linearGradient id="dynamiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF0044"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="fuseGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <ellipse cx="50" cy="95" rx="35" ry="5" fill="#1A1A2E" opacity="0.3"/>
  
