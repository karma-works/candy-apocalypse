<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120" width="180" height="120">
  <!-- Super Shotgun - Double barrel -->
  <!-- Left barrel -->
  <rect x="60" y="30" width="120" height="14" rx="3" fill="#555" stroke="#888" stroke-width="1.5"/>
  <!-- Right barrel -->
  <rect x="60" y="48" width="120" height="14" rx="3" fill="#555" stroke="#888" stroke-width="1.5"/>
  <!-- Band between barrels -->
  <rect x="100" y="32" width="10" height="28" rx="2" fill="#3a3a3a" stroke="#666" stroke-width="1"/>
  <rect x="160" y="32" width="10" height="28" rx="2" fill="#3a3a3a" stroke="#666" stroke-width="1"/>
  <!-- Receiver / action -->
  <rect x="20" y="30" width="45" height="32" rx="4" fill="#444" stroke="#777" stroke-width="1.5"/>
  <!-- Stock / grip -->
  <rect x="5" y="50" width="30" height="60" rx="5" fill="#5a3a20" stroke="#8a5a30" stroke-width="1.5"/>
  <!-- Wood grain lines -->
  <line x1="8" y1="57" x2="28" y2="57" stroke="#4a2a10" stroke-width="0.8"/>
  <line x1="8" y1="65" x2="28" y2="65" stroke="#4a2a10" stroke-width="0.8"/>
  <line x1="8" y1="73" x2="28" y2="73" stroke="#4a2a10" stroke-width="0.8"/>
  <!-- Trigger guard -->
  <path d="M35 60 Q48 70 55 62" fill="none" stroke="#666" stroke-width="2"/>
  <!-- Dual triggers -->
  <line x1="40" y1="62" x2="42" y2="72" stroke="#888" stroke-width="2"/>
  <line x1="46" y1="62" x2="48" y2="72" stroke="#888" stroke-width="2"/>
  <!-- Muzzle ends -->
  <ellipse cx="180" cy="37" rx="5" ry="7" fill="#222" stroke="#666" stroke-width="1"/>
  <ellipse cx="180" cy="55" rx="5" ry="7" fill="#222" stroke="#666" stroke-width="1"/>
</svg>
