<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 110" width="280" height="110">
  <!-- Chaingun - rotating barrels + body -->
  <!-- Main rectangular body -->
  <rect x="60" y="40" width="180" height="35" rx="4" fill="#4a4a4a" stroke="#777" stroke-width="1.5"/>
  <!-- Motor cylinder (big round housing) -->
  <ellipse cx="90" cy="57" rx="30" ry="28" fill="#3a3a3a" stroke="#666" stroke-width="2"/>
  <!-- Barrels (4 rotating) -->
  <rect x="90" y="20" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
  <rect x="90" y="36" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
  <rect x="90" y="52" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
  <rect x="90" y="68" width="170" height="8" rx="3" fill="#555" stroke="#888" stroke-width="1.2"/>
  <!-- Barrel ring brace -->
  <rect x="130" y="17" width="12" height="62" rx="3" fill="#3a3a3a" stroke="#666" stroke-width="1.2"/>
  <rect x="200" y="17" width="12" height="62" rx="3" fill="#3a3a3a" stroke="#666" stroke-width="1.2"/>
  <!-- Muzzle ring -->
  <ellipse cx="255" cy="57" rx="12" ry="38" fill="none" stroke="#888" stroke-width="2.5"/>
  <!-- Handle / backgrip -->
  <rect x="20" y="48" width="45" height="55" rx="5" fill="#3a3a3a" stroke="#666" stroke-width="1.5"/>
  <!-- Ammo belt hint -->
  <path d="M20 60 Q10 70 20 80" fill="none" stroke="#888" stroke-dasharray="3,3" stroke-width="2"/>
  <!-- Motor center detail -->
  <ellipse cx="90" cy="57" rx="10" ry="10" fill="#222" stroke="#555" stroke-width="1"/>
</svg>
