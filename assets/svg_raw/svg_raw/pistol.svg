<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Pistol - simple but recognizable -->
  <!-- Main grip -->
  <rect x="20" y="50" width="40" height="50" rx="4" fill="#3a3a3a" stroke="#666" stroke-width="1.5"/>
  <!-- Trigger guard -->
  <path d="M42 70 Q55 75 60 70" fill="none" stroke="#555" stroke-width="2"/>
  <!-- Barrel -->
  <rect x="60" y="42" width="110" height="18" rx="3" fill="#444" stroke="#777" stroke-width="1.5"/>
  <!-- Slide -->
  <rect x="60" y="42" width="90" height="8" rx="2" fill="#555" stroke="#888" stroke-width="1"/>
  <!-- Front sight -->
  <rect x="155" y="35" width="8" height="8" rx="1" fill="#888"/>
  <!-- Ejection port -->
  <rect x="95" y="44" width="25" height="8" rx="1" fill="#222" stroke="#555" stroke-width="0.5"/>
  <!-- Trigger -->
  <path d="M51 70 L55 80" fill="none" stroke="#666" stroke-width="2.5"/>
  <!-- Hammer -->
  <rect x="22" y="48" width="10" height="8" rx="2" fill="#555"/>
</svg>
